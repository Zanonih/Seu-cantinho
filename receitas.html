<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receitas · Para Você</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="receitas">

<header class="site-header">
  <p class="site-subtitle">seu cantinho</p>
  <h1 class="site-title">Para Você</h1>
  <nav aria-label="Navegação principal">
    <ul class="stamp-nav">
      <li><a href="index.html" data-page="inicio"><span class="icon">🏠</span>Início</a></li>
      <li><a href="album.html" data-page="album"><span class="icon">🖼️</span>Álbum</a></li>
      <li><a href="musica.html" data-page="musica"><span class="icon">🎵</span>Música</a></li>
      <li><a href="filmes.html" data-page="filmes"><span class="icon">🎬</span>Assistir</a></li>
      <li><a href="receitas.html" data-page="receitas"><span class="icon">🍳</span>Receitas</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="card" style="text-align:center;">
    <div class="wax-seal" aria-hidden="true" style="margin:0 auto;">🍳</div>
    <h2 class="section-title" style="margin-top:1rem;">O que vamos cozinhar?</h2>

    <div class="draw-stage">
      <div class="slot-machine">
        <div class="slot-lights" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="reel-window" id="receita-reel-window">
          <div class="reel-marker" aria-hidden="true"></div>
          <div class="reel-list" id="receita-reel-list">
            <div class="reel-item">?</div>
          </div>
        </div>
      </div>
      <div class="draw-actions">
        <button class="btn" id="receita-sortear">Sortear receita 🥄</button>
        <button class="btn btn-ghost" id="receita-reset">Recomeçar ↺</button>
      </div>
      <p class="draw-note" id="receita-draw-note">clique quantas vezes quiser</p>
      <ul class="draw-pool" id="receita-pool-list" aria-label="Lista de receitas"></ul>
    </div>
  </section>
</main>

<footer class="site-footer">Te amo, Te sinto e Te vejo ♥️</footer>

<script src="js/script.js"></script>
<script>
  initReel({
    buttonId: "receita-sortear",
    resetButtonId: "receita-reset",
    windowId: "receita-reel-window",
    listId: "receita-reel-list",
    poolListId: "receita-pool-list",
    noteId: "receita-draw-note",
    items: RECEITAS,
    storageKey: "receitas",
  });
</script>
<script src="js/pets-data.js"></script>
<script>
  initPetScene(PETS_BICHINHOS);
</script>
</body>
</html>
